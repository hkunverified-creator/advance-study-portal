<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AST PRO | Shinobi HUD Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.8);
            --neon-cyan: #22d3ee;
            --neon-purple: #a855f7;
            --neon-green: #10b981;
            --neon-red: #f43f5e;
            --text: #f1f5f9;
            --border: rgba(34, 211, 238, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            background-image: linear-gradient(to bottom, rgba(2, 6, 23, 0.9), rgba(15, 23, 42, 0.9)), url('https://w0.peakpx.com/wallpaper/424/66/HD-wallpaper-anime-scenery-night-sky-stars-clouds-scenic-anime-landscape.jpg');
            background-size: cover; background-attachment: fixed;
            min-height: 100vh; overflow-x: hidden;
        }

        .hud-container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* --- ANIME DASHBOARD --- */
        .dashboard-header {
            display: grid; grid-template-columns: 350px 1fr 300px; gap: 20px; margin-bottom: 30px;
        }

        .char-frame {
            background: var(--panel); border: 2px solid var(--neon-cyan); border-radius: 20px;
            height: 450px; position: relative; overflow: hidden;
            box-shadow: 0 0 20px var(--neon-cyan);
        }
        .char-frame img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-box {
            background: var(--panel); border: 1px solid var(--border); padding: 20px;
            border-radius: 15px; backdrop-filter: blur(10px); transition: 0.3s;
        }
        .stat-box:hover { border-color: var(--neon-purple); box-shadow: 0 0 15px var(--neon-purple); }
        .stat-label { font-family: 'Orbitron', sans-serif; font-size: 0.7rem; color: var(--neon-cyan); margin-bottom: 10px; }
        .stat-value { font-size: 2.2rem; font-weight: 800; }

        .progress-hud { height: 10px; background: #000; border-radius: 5px; margin-top: 10px; overflow: hidden; border: 1px solid var(--border); }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple)); width: 0%; transition: 1s cubic-bezier(0.1, 0.7, 1.0, 0.1); }

        /* --- SECTION STYLING --- */
        .hud-panel {
            background: var(--panel); border: 1px solid var(--border);
            border-radius: 20px; padding: 25px; margin-bottom: 25px; backdrop-filter: blur(10px);
        }
        h3 { font-family: 'Orbitron', sans-serif; margin-bottom: 20px; color: var(--neon-cyan); display: flex; align-items: center; gap: 10px; }

        input, select, .type-selector { background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 15px; width: 100%; }
        
        /* NATURE OF TASK LIST */
        .nature-list { display: flex; gap: 10px; margin-bottom: 15px; }
        .nature-item { 
            flex: 1; padding: 10px; text-align: center; border: 1px solid var(--border); 
            border-radius: 10px; cursor: pointer; font-size: 0.8rem; transition: 0.3s;
        }
        .nature-item.active { background: var(--neon-cyan); color: #000; font-weight: 800; box-shadow: 0 0 10px var(--neon-cyan); }

        .btn-glitch {
            background: var(--neon-cyan); color: #000; font-family: 'Orbitron', sans-serif;
            font-weight: 900; padding: 15px; border: none; border-radius: 10px; width: 100%;
            text-transform: uppercase; transition: 0.2s;
        }
        .btn-glitch:hover { background: var(--neon-purple); color: #fff; transform: translateY(-3px); }

        /* TABLES */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
        th { text-align: left; color: var(--neon-cyan); padding: 12px; border-bottom: 2px solid var(--border); font-family: 'Orbitron', sans-serif; }
        td { padding: 12px; border-bottom: 1px solid var(--border); }

        .preview-btn { color: var(--neon-cyan); text-decoration: underline; cursor: pointer; }
        #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        #modalOverlay iframe, #modalOverlay img { max-width: 90%; max-height: 90%; border: 2px solid var(--neon-cyan); }
    </style>
</head>
<body>

<div id="modalOverlay" onclick="this.style.display='none'"><div id="modalBody"></div></div>

<div class="hud-container">
    <section class="dashboard-header">
        <div class="char-frame">
            <img src="https://i.pinimg.com/originals/93/f3/7a/93f37a6c6a7a0129a007358e805561a7.gif" alt="Shinobi">
        </div>
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">🔥 PHYSICAL STREAK</div>
                <div class="stat-value" id="physVal">0</div>
                <div class="progress-hud"><div id="physBar" class="progress-fill"></div></div>
            </div>
            <div class="stat-box">
                <div class="stat-label">📚 READING STREAK</div>
                <div class="stat-value" id="readVal">0</div>
                <div class="progress-hud"><div id="readBar" class="progress-fill"></div></div>
            </div>
            <div class="stat-box">
                <div class="stat-label">⚡ TASK COMPLETION</div>
                <div class="stat-value" id="taskVal">0%</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">💎 TOTAL CREDITS</div>
                <div class="stat-value" id="creditVal">0</div>
            </div>
        </div>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button class="btn-glitch" onclick="exportReport()">📊 EXCEL EXPORT</button>
            <button class="btn-glitch" style="background: var(--neon-red);" onclick="clearAllData()">⚠️ SEMESTER RESET</button>
        </div>
    </section>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <section class="hud-panel">
            <h3>📂 SYLLABUS DATABASE</h3>
            <input id="sCode" placeholder="Subject Code">
            <input id="sName" placeholder="Subject Name">
            <input id="sCredit" type="number" placeholder="Credits">
            <label style="font-size: 0.7rem; color: var(--neon-cyan);">SYLLABUS PROOF (< 1MB)</label>
            <input type="file" id="sFile" accept="image/*, .pdf">
            <button class="btn-glitch" onclick="saveSyllabus()">UPLOAD SYLLABUS</button>
            
            <table>
                <thead><tr><th>CODE</th><th>CREDITS</th><th>SYLLABUS</th><th>ACTION</th></tr></thead>
                <tbody id="syllTableBody"></tbody>
            </table>
        </section>

        <section class="hud-panel">
            <h3>⚔️ OPERATIONAL TASKS</h3>
            <select id="tCodeSelector" onchange="autoFillSubjectName()">
                <option value="">-- Select Verified Code --</option>
            </select>
            <div id="tNameDisplay" style="margin-bottom: 15px; color: var(--neon-purple); font-weight: 800; font-size: 1.1rem;"></div>
            
            <input id="tTopic" placeholder="Lesson / Topic Detail">
            
            <div class="stat-label">NATURE OF TASK</div>
            <div class="nature-list" id="natureList">
                <div class="nature-item" onclick="setNature('Theory')">Theory</div>
                <div class="nature-item" onclick="setNature('Problem')">Problem</div>
                <div class="nature-item" onclick="setNature('Graphical')">Graphical</div>
            </div>

            <input type="datetime-local" id="tDeadline">
            <label style="font-size: 0.7rem; color: var(--neon-cyan);">TASK PROOF (MANDATORY)</label>
            <input type="file" id="tFile" accept="image/*, .pdf">
            <button class="btn-glitch" onclick="saveTask()">DEPLOY MISSION</button>
        </section>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <section class="hud-panel">
            <h3>🏃 PHYSICAL GROWTH (DAILY)</h3>
            <input id="pName" placeholder="Activity (e.g. Gym 1, Cardio 2)">
            <input type="file" id="pFile">
            <button class="btn-glitch" onclick="submitHabit('physical')">SUBMIT DAILY PROOF</button>
        </section>
        <section class="hud-panel">
            <h3>📖 KNOWLEDGE READING (DAILY)</h3>
            <input id="rName" placeholder="Book / Chapter Title">
            <input type="file" id="rFile">
            <button class="btn-glitch" onclick="submitHabit('reading')">SUBMIT DAILY PROOF</button>
        </section>
    </div>
</div>

<script>
    let activeNature = "";
    
    // --- CORE LOGIC ---
    function setNature(val) {
        document.querySelectorAll('.nature-item').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');
        activeNature = val;
    }

    function autoFillSubjectName() {
        const code = document.getElementById('tCodeSelector').value;
        const subjects = JSON.parse(localStorage.getItem('subjects') || '[]');
        const sub = subjects.find(s => s.code === code);
        document.getElementById('tNameDisplay').innerText = sub ? `TARGET: ${sub.name}` : "";
    }

    async function saveSyllabus() {
        const file = document.getElementById('sFile').files[0];
        if(!file) return alert("DOCUMENT REQUIRED! Upload syllabus first.");
        const base64 = await toBase64(file);
        
        const sub = {
            code: document.getElementById('sCode').value,
            name: document.getElementById('sName').value,
            credits: document.getElementById('sCredit').value,
            proof: base64,
            id: Date.now()
        };
        
        let subjects = JSON.parse(localStorage.getItem('subjects') || '[]');
        subjects.push(sub);
        localStorage.setItem('subjects', JSON.stringify(subjects));
        location.reload();
    }

    async function saveTask() {
        const file = document.getElementById('tFile').files[0];
        if(!file) return alert("⚠️ MISSION REJECTED: Proof of completion is mandatory!");
        
        const task = {
            code: document.getElementById('tCodeSelector').value,
            topic: document.getElementById('tTopic').value,
            nature: activeNature,
            deadline: document.getElementById('tDeadline').value,
            proof: await toBase64(file),
            status: "Completed",
            date: new Date().toISOString()
        };

        let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
        tasks.push(task);
        localStorage.setItem('tasks', JSON.stringify(tasks));
        location.reload();
    }

    async function submitHabit(type) {
        const fileInput = type === 'physical' ? 'pFile' : 'rFile';
        const nameInput = type === 'physical' ? 'pName' : 'rName';
        const file = document.getElementById(fileInput).files[0];
        
        if(!file) return alert("⚠️ DAILY RESET BLOCK: Proof required for streak!");

        const habit = {
            type,
            name: document.getElementById(nameInput).value,
            proof: await toBase64(file),
            date: new Date().toISOString().split('T')[0]
        };

        let habits = JSON.parse(localStorage.getItem('habits') || '[]');
        habits.push(habit);
        localStorage.setItem('habits', JSON.stringify(habits));
        location.reload();
    }

    // --- REFRESH & DASHBOARD ---
    window.onload = () => {
        const subjects = JSON.parse(localStorage.getItem('subjects') || '[]');
        const habits = JSON.parse(localStorage.getItem('habits') || '[]');
        const tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
        const today = new Date().toISOString().split('T')[0];

        // Fill Selector & Table
        const selector = document.getElementById('tCodeSelector');
        const syllTable = document.getElementById('syllTableBody');
        let totalCr = 0;

        subjects.forEach(s => {
            totalCr += parseFloat(s.credits || 0);
            selector.innerHTML += `<option value="${s.code}">${s.code}</option>`;
            syllTable.innerHTML += `<tr><td>${s.code}</td><td>${s.credits}</td><td><span class="preview-btn" onclick="openPreview('${s.proof}')">View</span></td><td><button onclick="deleteSubject(${s.id})" style="background:none; border:none; color:red; cursor:pointer;">Flash Wipe</button></td></tr>`;
        });

        document.getElementById('creditVal').innerText = totalCr;

        // Habit Streaks (0/50/100)
        const pCount = habits.filter(h => h.type === 'physical' && h.date === today).length;
        const rCount = habits.filter(h => h.type === 'reading' && h.date === today).length;

        const pPerc = Math.min(pCount * 50, 100);
        const rPerc = Math.min(rCount * 50, 100);

        document.getElementById('physBar').style.width = pPerc + "%";
        document.getElementById('readBar').style.width = rPerc + "%";
        
        // Calculate Streaks
        document.getElementById('physVal').innerText = calculateStreak(habits, 'physical');
        document.getElementById('readVal').innerText = calculateStreak(habits, 'reading');
    };

    function calculateStreak(habits, type) {
        const dates = [...new Set(habits.filter(h => h.type === type).map(h => h.date))].sort().reverse();
        let streak = 0;
        let checkDate = new Date().toISOString().split('T')[0];
        
        for(let d of dates) {
            if(d === checkDate) {
                streak++;
                let prev = new Date(checkDate);
                prev.setDate(prev.getDate() - 1);
                checkDate = prev.toISOString().split('T')[0];
            } else break;
        }
        return streak;
    }

    function deleteSubject(id) {
        if(!confirm("WIPE ALL DATA FOR THIS SUBJECT?")) return;
        let subjects = JSON.parse(localStorage.getItem('subjects') || '[]');
        const sub = subjects.find(s => s.id === id);
        subjects = subjects.filter(s => s.id !== id);
        localStorage.setItem('subjects', JSON.stringify(subjects));
        
        let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
        tasks = tasks.filter(t => t.code !== sub.code);
        localStorage.setItem('tasks', JSON.stringify(tasks));
        location.reload();
    }

    function exportReport() {
        const subjects = JSON.parse(localStorage.getItem('subjects') || '[]');
        const tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
        const habits = JSON.parse(localStorage.getItem('habits') || '[]');
        
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet([{Credits: document.getElementById('creditVal').innerText}]), "Dashboard");
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(subjects), "Syllabus");
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(tasks), "Tasks");
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(habits.filter(h => h.type==='physical')), "Physical");
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(habits.filter(h => h.type==='reading')), "Reading");
        XLSX.writeFile(wb, "Shinobi_Monthly_Log.xlsx");
    }

    function openPreview(src) {
        const modal = document.getElementById('modalOverlay');
        const body = document.getElementById('modalBody');
        modal.style.display = 'flex';
        body.innerHTML = src.includes('pdf') ? `<iframe src="${src}" width="800" height="600"></iframe>` : `<img src="${src}">`;
    }

    const toBase64 = file => new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
    });

    function clearAllData() { if(confirm("NUCLEAR RESET?")) { localStorage.clear(); location.reload(); } }
</script>

</body>
</html>
